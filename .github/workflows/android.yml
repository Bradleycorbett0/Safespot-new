name: Build SafeSpot APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_API: "33"
      ANDROID_BUILD_TOOLS: "33.0.2"
      ANDROID_NDK_VERSION: "25.2.9519653"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip tar wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev

      - name: Set Java and Android paths
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROIDSDK=$SDK_ROOT" >> $GITHUB_ENV
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$SDK_ROOT/build-tools/$ANDROID_BUILD_TOOLS" >> $GITHUB_PATH

      - name: Clean old build folders
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          mkdir -p "$SDK_ROOT/cmdline-tools"

      - name: Install Android command line tools
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
          mkdir -p /tmp/android-tools
          unzip -q cmdline.zip -d /tmp/android-tools
          rm cmdline.zip

          mkdir -p "$SDK_ROOT/cmdline-tools"
          mv /tmp/android-tools/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"

      - name: Accept Android licenses
        run: |
          mkdir -p "$SDK_ROOT/licenses"

          cat > "$SDK_ROOT/licenses/android-sdk-license" <<EOF
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          d56f5187479451eabf01fb78af6dfcb131a6481e
          EOF

          cat > "$SDK_ROOT/licenses/android-sdk-preview-license" <<EOF
          84831b9409646a918e30573bab4c9c91346d8abd
          EOF

          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" --licenses || true

      - name: Install Android SDK packages
        run: |
          "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_API}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Verify AIDL
        run: |
          ls -l "$SDK_ROOT/build-tools/$ANDROID_BUILD_TOOLS/aidl"

      - name: Install Buildozer
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer

      - name: Build APK
        run: |
          source venv/bin/activate
          export ANDROID_HOME="$SDK_ROOT"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export ANDROIDSDK="$SDK_ROOT"
          export ANDROID_NDK_HOME="$SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          export ANDROIDNDK="$SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeSpot-APK
          path: bin/*.apk
