name: Build SafeSpot APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip tar wget curl \
            build-essential \
            clang lld \
            libffi-dev libssl-dev \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev

      - name: Hard clean old build
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf bin
          rm -rf ~/.cache/pip
          rm -rf ~/.gradle/caches

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cython==0.29.36
          python -m pip install buildozer==1.5.0

      - name: Show Buildozer config
        run: |
          cat buildozer.spec
          grep -n "requirements" buildozer.spec || true
          grep -n "p4a.branch" buildozer.spec || true

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeSpot-APK
          path: bin/*.apk
